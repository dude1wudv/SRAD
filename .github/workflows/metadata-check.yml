name: Metadata Check

on:
  push:
  pull_request:

jobs:
  python-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run reusable ours_192lane checks
        run: python scripts/check_ours_192lane.py
