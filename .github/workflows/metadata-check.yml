name: Metadata Check

on:
  push:
  pull_request:

jobs:
  python-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python files
        run: python -m compileall variants benchmarks research archive scripts
      - name: Run ours_192lane semantic checks
        working-directory: variants/srad/ours_192lane
        run: python data/test_sim_semantics.py
